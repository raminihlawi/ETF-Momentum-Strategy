name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/home/ubuntu/etf-ppm-stocks"
            VENV="$DEPLOY_DIR/venv"
            DATA_DIR="$DEPLOY_DIR/data"

            echo "── Pulling latest code ───────────────────────"
            cd "$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "── Updating Python dependencies ──────────────"
            "$VENV/bin/pip" install -q --upgrade \
              -r "$DEPLOY_DIR/dashboard/backend/requirements.txt"

            echo "── Syncing results to data dir ───────────────"
            mkdir -p "$DATA_DIR/results"
            for f in "$DEPLOY_DIR"/results/*.json; do
              [ -f "$f" ] && cp "$f" "$DATA_DIR/results/"
            done

            echo "── Restarting service ────────────────────────"
            sudo systemctl restart etf-dashboard

            echo "── Waiting for service to be ready ───────────"
            sleep 3
            systemctl is-active etf-dashboard \
              && echo "✓ Service is running" \
              || (echo "✗ Service failed to start"; journalctl -u etf-dashboard -n 30; exit 1)

            echo "── Deploy complete ───────────────────────────"
