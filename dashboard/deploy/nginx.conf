# /etc/nginx/sites-available/etf-dashboard
# Symlink: ln -s /etc/nginx/sites-available/etf-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;          # replace with your domain or IP

    # Redirect HTTP → HTTPS (uncomment once cert is set up)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Cache data.json for 1 minute (engine rewrites it monthly anyway)
    location = /static/data.json {
        proxy_pass          http://127.0.0.1:8765;
        proxy_cache_valid   200 1m;
        add_header          Cache-Control "public, max-age=60";
    }
}

