# ETF Dashboard — nginx config
# Replace YOUR_DOMAIN with your actual domain before deploying.
# After issuing a Let's Encrypt cert, uncomment the HTTPS block
# and add the redirect in the HTTP block.

upstream app {
    server 127.0.0.1:8765;
    keepalive 8;
}

# ── HTTP (redirect to HTTPS once cert is live) ─────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Uncomment once cert is issued:
    # location / { return 301 https://$host$request_uri; }

    # Until HTTPS is configured, proxy HTTP directly
    location / {
        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

